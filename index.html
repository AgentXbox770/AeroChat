<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <meta property="og:title" content="AeroChat">
    <meta property="og:description" content="frutiger aero chat, free!">
    <meta property="og:type" content="website">
    
    <title>AeroChat</title>
    
    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://twemoji.maxcdn.com/v/14.0.2/twemoji.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app-check.js"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=6LfAYcMsAAAAAPXmtJ8wUj5me6N6So8UHOmSSuPt"></script>

    <link rel="stylesheet" href="aerostyle.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<div id="bg"></div>

<div id="search-container">
    <input type="text" id="search-input" placeholder="Search messages...">
    <div id="search-results"></div>
</div>

<div class="top-buttons">
    <button id="settings-btn">Settings</button>
    <button id="rules-btn">Rules</button>
    <button id="admin-panel-btn" class="rgb-effect" style="display: inline-block; background: rgba(255, 255, 255, 0.4); cursor: pointer; font-weight: bold; padding: 5px 15px; border-radius: 5px; border: 2px solid;">Admin Panel</button>
</div>

<div id="sidebar">
    <div style="color:white; font-weight:bold; margin-bottom:10px;">Users</div>
    <div id="user-list"></div>
</div>

<div id="floating-tracker" style="position: fixed; top: 20px; right: 20px; width: 320px; height: 230px; z-index: 10000; cursor: grab; user-select: none;">
    <div id="drag-handle" style="position: absolute; top: 0; left: 0; width: 100%; height: 50px; z-index: 10001;"></div>
    
    <iframe src="tracker.html" style="width: 100%; height: 100%; border: none; border-radius: 20px; pointer-events: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.15);"></iframe>
</div>

<div id="admin-panel" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; z-index: 999999; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.6); padding: 20px; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 15px;">
        <h3 style="margin: 0; font-size: 18px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);">Admin Control Panel</h3>
        <button onclick="document.getElementById('admin-panel').style.display='none'" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; cursor: pointer; font-weight: bold; border-radius: 4px; padding: 2px 8px;">X</button>
    </div>
    
    <div style="margin-bottom: 20px;">
        <p style="margin: 0 0 10px 0; font-size: 14px; opacity: 0.9;">Server Actions:</p>
        <button id="clear-msg-btn" style="width: 100%; padding: 10px; margin-bottom: 8px; cursor: pointer; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.5); color: white; font-weight: bold; border-radius: 5px;">Clear All Messages</button>
    </div>

    <div style="margin-bottom: 20px;">
        <p style="margin: 0 0 10px 0; font-size: 14px; opacity: 0.9;">User Restrictions:</p>
        <input type="text" placeholder="Username to ban..." style="width: 100%; padding: 10px; margin-bottom: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 5px; box-sizing: border-box;">
        <button style="width: 100%; padding: 10px; cursor: pointer; background: rgba(200, 0, 0, 0.5); border: 1px solid white; color: white; font-weight: bold; border-radius: 5px;">Terminate User Session</button>
    </div>

    <div>
        <p style="margin: 0 0 10px 0; font-size: 14px; opacity: 0.9;">Mute and lock chat:</p>
        <input id="mute-username-input" type="text" placeholder="Username to mute..." style="width: 100%; padding: 10px; margin-bottom: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 5px; box-sizing: border-box;">
        <button id="mute-user-btn" style="width: 100%; padding: 10px; margin-bottom: 8px; cursor: pointer; background: rgba(200, 0, 0, 0.5); border: 1px solid white; color: white; font-weight: bold; border-radius: 5px;">Mute User</button>
        <button id="lock-chat-btn" style="width: 100%; padding: 10px; cursor: pointer; background: rgba(200, 0, 0, 0.5); border: 1px solid white; color: white; font-weight: bold; border-radius: 5px;">Lock Chat for all</button>
    </div>
</div>
    
<div id="chat-window"></div>

<div class="dock">
    <input type="file" id="file-input" accept=".mp3,.mp4,.png,.jpg,.jpeg,.webp">
    <button class="plus-btn" onclick="document.getElementById('file-input').click()">+</button>
    <input type="text" id="messageInput" placeholder="Type a message...">
    <button id="sendBtn">Send</button>
</div>

<div id="settings-window">
    <div class="win7-title">
        <span>Settings</span>
        <button class="close-btn" onclick="toggleSettings()">X</button>
    </div>
    <div class="win7-content">
        <div class="pfp-area">
            <img id="my-pfp" src="pfps/defaults/pfpdefault1.png" class="pfp-img">
            <img src="pfps/pfpframe.png" class="pfp-frame">
        </div>
        <div>
            <label>Username:</label><br>
            <input type="text" id="username-input" value="guest376">
        </div>
        <div class="pfp-grid" id="pfp-options"></div>
    </div>
</div>

<script>
    (function() {
        var devtoolsOpen = false;
        var threshold = 160;
        var blocked = false;

        function block() {
            if (blocked) return;
                blocked = true;
                document.body.innerHTML = '<div style="background:#000;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;font-family:sans-serif;font-size:24px;gap:20px;">❌ DevTools is not allowed.<button onclick="window.close()" style="padding:10px 30px;font-size:16px;cursor:pointer;border:none;border-radius:8px;background:#fff;color:#000;">Fechar</button></div>';
                document.body.style.cssText = 'margin:0;padding:0;';
        }

        setInterval(function() {
            var widthDiff = window.outerWidth - window.innerWidth;
            var heightDiff = window.outerHeight - window.innerHeight;
            if (widthDiff > threshold || heightDiff > threshold) {
                if (!devtoolsOpen) {
                    devtoolsOpen = true;
                    block();
                }
            } else {
                devtoolsOpen = false;
            }
        }, 500);

        window.addEventListener('keydown', function(e) {
            if (
                e.key === 'F12' ||
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                (e.ctrlKey && e.key === 'U')
            ) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        });

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
    })();
    // --- 1. CONFIG & SETUP ---
    firebase.initializeApp(firebaseConfig);

    const appCheck = firebase.appCheck();
    appCheck.activate('6LfAYcMsAAAAAPXmtJ8wUj5me6N6So8UHOmSSuPt', true);
    
    const db = firebase.database();

    let myUsername = localStorage.getItem('username') || "Guest" + Math.floor(Math.random()*1000);
    let myPfp = localStorage.getItem('pfp') || "pfps/defaults/pfpdefault1.png";

    const _setTimeout = window.setTimeout;
    const _setInterval = window.setInterval;
    
    document.getElementById('username-input').value = myUsername;

    // Emoticon mapping
    const emoticons = {
        ':amogus:': 'amogus.png',
        ':hehe:': 'hehe.png',
        ':pepeds:': 'pepeds.gif',
        ':trollsmile:': 'trollsmile.gif',
        ':sussy:': 'sussy.png',
        ':banned:': 'banned.gif',
        ':sus:': 'sus.png',
        ':hug:': 'dogehug.png',
        ':isawthat:': 'jesussawthat.png',
        ':heheboi:': 'heheboi.png',
        ':didiask:': 'didiask.png',
        ':holy:': 'pepeholy.png',
        ':suycf:': 'suycf.png',
        ':heart:': 'heart.png',
        ':200iq:': '200iq.gif',
        ':pog:': 'pogcat.png',
        ':armed:': 'armed.gif',
        ':noob:': 'pepenoob.png',
        ':rage:': 'rage.gif',
        ':cringe:': 'pepecringe.png',
        ':catscream:': 'catscream.gif',
        ':awesome:': 'awesome.png'
    };

    function parseEmoticons(text) {
        let parsedText = text;
        for (const [code, filename] of Object.entries(emoticons)) {
            const regex = new RegExp(code.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
            parsedText = parsedText.replace(regex, `<img src="emoticons/${filename}" class="emoticon-img" alt="${code}" title="${code}">`);
        }
        return parsedText;
    }

    function parseLinks(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, (url) => {
            if (url.includes('youtube.com/watch') || url.includes('youtu.be/') || url.includes('youtube.com/shorts')) {
                return '';
            }
            return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
        });
    }

    function extractYouTubeID(url) {
        const patterns = [
            /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([^&\s?#]+)/
        ];
        for (const pattern of patterns) {
            const match = url.match(pattern);
            if (match) return match[1];
        }
        return null;
    }

    function processMessage(text) {
        let processed = parseEmoticons(text);
        processed = parseLinks(processed);
        
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        const urls = text.match(urlRegex) || [];
        let youtubeEmbed = '';
        
        for (const url of urls) {
            const videoId = extractYouTubeID(url);
            if (videoId) {
                youtubeEmbed = `
                    <div class="youtube-embed">
                        <iframe width="356" height="200" 
                            src="https://www.youtube.com/embed/${videoId}" 
                            frameborder="0" allowfullscreen>
                        </iframe>
                    </div>
                `;
                break;
            }
        }
        
        return { processed, youtubeEmbed };
    }

    function getBadge(username) {
        if (username === "agentxbox!") return '<img src="badges/owner.gif" class="badge-img" title="Owner">';
        if (username === "BryanSuperAero") return '<img src="badges/admin.png" class="badge-img" title="Admin">';
        if (username === "aeroPlayerwindows7") return '<img src="badges/admin.png" class="badge-img" title="Admin">';
        return '<img src="badges/member.png" class="badge-img" title="Member">';
    }

    function parseEmojis(text) {
        return twemoji.parse(text, {
            folder: 'svg',
            ext: '.svg',
            className: 'emoji'
        });
    }
    
    function sanitizeForFirebase(str) {
        return str.replace(/[.#$[\]]/g, '_');
    }

    const usersRef = db.ref('users');
    const userList = document.getElementById('user-list');
    
    function registerUser() {
        const safeKey = sanitizeForFirebase(myUsername);
        const userRef = usersRef.child(safeKey);
        const allowedAdmins = ["BryanSuperAero", "aeroPlayerwindows7", "agentxbox!"];
        const btn = document.getElementById('admin-panel-btn');
        const frame = document.getElementById('admin-panel')

        let displayPfp = myPfp;
        if (myUsername === "aeroPlayerwindows7") {
            displayPfp = "pfps/AdmPfp.png";
        } else if (myUsername === "agentxbox!") {
            displayPfp = "pfps/OwnerPfp.png";
        } else if (myUsername === "TheAeroFan101_2") {
            displayPfp = "pfps/AeroFanPfp.jfif";
        } else if (myUsername === "Oiacat") {
            displayPfp = "pfps/StopPfp.webp";
        }

    
        const userData = {
            username: myUsername,
            pfp: displayPfp,
            lastSeen: firebase.database.ServerValue.TIMESTAMP
        };

        if (allowedAdmins.includes(myUsername)) {
            userData.admin = true;
            if (btn) btn.style.setProperty('display', 'inline-block', 'important');
        } else {
            if (btn) btn.remove();
            if (frame) frame.remove();
        }

        userRef.set(userData);
        userRef.onDisconnect().remove();
    }
    
    function cleanupOldUsers() {
        const safeKey = sanitizeForFirebase(myUsername);
        usersRef.child(safeKey).remove();
    }
    
    cleanupOldUsers();
    setTimeout(() => registerUser(), 100);

    usersRef.on('value', (snapshot) => {
    userList.innerHTML = '';
    const users = snapshot.val();
    if (users) {
        Object.values(users).forEach(user => {
            if (!user || !user.username) return;
            
            const userDiv = document.createElement('div');
            userDiv.className = 'user-item';

            const cleanUsername = DOMPurify.sanitize(user.username);
            const cleanPfp = DOMPurify.sanitize(user.pfp || 'pfps/defaults/pfpdefault1.png');
            
            userDiv.innerHTML = `
                <div class="user-pfp-area">
                    <img src="${cleanPfp}" class="user-pfp-img">
                    <img src="pfps/pfpframe.png" class="user-pfp-frame">
                </div>
                <span class="user-name">
                    <span class="user-name-text">${user.username}</span>
                    ${getBadge(user.username)}
                </span>
            `;
            
            const nameSpan = userDiv.querySelector('.user-name-text');
            nameSpan.textContent = user.username; 
            nameSpan.innerHTML = parseEmojis(nameSpan.textContent);
            
            userList.appendChild(userDiv);
        });
        
        userList.scrollTop = userList.scrollHeight;
    }
});

    setInterval(() => {
        const safeKey = sanitizeForFirebase(myUsername);
        const userRef = usersRef.child(safeKey);
        userRef.update({
            lastSeen: firebase.database.ServerValue.TIMESTAMP
        });
    }, 30000);

    // --- 2. WALLPAPER ROTATION ---
    const walls = [
        'wallpapers/wallpaper1.png',
        'wallpapers/wallpaper2.png',
        'wallpapers/wallpaper3.png',
        'wallpapers/wallpaper5.png',
        'wallpapers/wallpaper6.png',
        'wallpapers/wallpaper7.png'
    ];
    let wIdx = 0;
    function rotateWall() {
        document.getElementById('bg').style.backgroundImage = `url('${walls[wIdx]}')`;
        wIdx = (wIdx + 1) % walls.length;
    }
    rotateWall();
    setInterval(rotateWall, 60000);

    // --- 3. SETTINGS LOGIC ---
    function toggleSettings() {
        const win = document.getElementById('settings-window');
        win.style.display = win.style.display === 'block' ? 'none' : 'block';
    }
    document.getElementById('settings-btn').onclick = toggleSettings;

    // --- 4. RULES BUTTON ---
    document.getElementById('rules-btn').onclick = () => {
        alert(`RULES:\nno nsfw\nor corn things\ndo not hack. this place is not securised.\nMORE NEW THINGS COMING SOON!!`);
    };

    document.getElementById('admin-panel-btn').onclick = () => {
        document.getElementById('admin-panel').style.display = 'block';
    };

    const el = document.getElementById("floating-tracker");
    const handle = document.getElementById("drag-handle");
    let x = 0, y = 0, dx = 0, dy = 0;

    handle.onmousedown = (e) => {
        e.preventDefault();
        dx = e.clientX; dy = e.clientY;
        document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; el.style.cursor = "grab"; };
        document.onmousemove = (e) => {
            e.preventDefault();
            x = dx - e.clientX; y = dy - e.clientY;
            dx = e.clientX; dy = e.clientY;
            el.style.top = (el.offsetTop - y) + "px";
            el.style.left = (el.offsetLeft - x) + "px";
            el.style.right = "auto";
            el.style.cursor = "grabbing";
        };
    };

    let chatLocked = false;
    const lockBtn = document.getElementById('lock-chat-btn');

    db.ref('chatConfig/locked').on('value', (snapshot) => {
        chatLocked = snapshot.val() || false;
    
        if (chatLocked) {
            lockBtn.innerText = "Unlock Chat for all";
            lockBtn.style.background = "rgba(0, 150, 0, 0.5)";
        } else {
            lockBtn.innerText = "Lock Chat for all";
            lockBtn.style.background = "rgba(200, 0, 0, 0.5)";
        }
    });

    lockBtn.onclick = () => {
        db.ref('chatConfig').update({ locked: !chatLocked })
            .catch((err) => {
                alert("error: " + err);
            });
    };

    let isMuted = false;
    const muteBtn = document.getElementById('mute-user-btn');
    const muteInput = document.getElementById('mute-username-input');

    db.ref('chatConfig/mutes/' + myUsername).on('value', (snapshot) => {
        isMuted = snapshot.val() || false;
    });

    muteBtn.onclick = () => {
        const target = muteInput.value.trim();
        if (!target) return;

        const targetRef = db.ref('chatConfig/mutes/' + target);
    
        targetRef.once('value').then((snapshot) => {
            const currentlyMuted = snapshot.val() || false;
            targetRef.set(!currentlyMuted)
                .then(() => {
                    alert(target + (currentlyMuted ? " unmuted" : " muted"));
                    muteInput.value = "";
                });
        });
    };

    // Build PFP Grid
    const grid = document.getElementById('pfp-options');
    for(let i=1; i<=10; i++) {
        let img = document.createElement('img');
        let path = `pfps/defaults/pfpdefault${i}.png`;
        img.src = path;
        img.className = 'pfp-choice';
        img.onclick = () => {
            myPfp = path;
            document.getElementById('my-pfp').src = path;
            localStorage.setItem('pfp', path);
            const safeKey = sanitizeForFirebase(myUsername);
            const userRef = usersRef.child(safeKey);
            userRef.update({ pfp: path });
        };
        grid.appendChild(img);
    }

    const clearBtn = document.getElementById('clear-msg-btn');

    clearBtn.onclick = () => {
        if (confirm("are you sure?? this will destroy all the history of chat")) {
            db.ref('messages').remove()
                .then(() => {
                    console.log("chat history wiped");
                })
                .catch((err) => {
                    alert("error: " + err);
                });
        }
    };

    document.getElementById('username-input').onchange = (e) => {
        const oldUsername = myUsername;
        myUsername = e.target.value;
        localStorage.setItem('username', myUsername);
        
        const oldKey = sanitizeForFirebase(oldUsername);
        usersRef.child(oldKey).remove();
        registerUser();
    };

    // --- 5. FILE UPLOAD ---
    const fileInput = document.getElementById('file-input');
    let currentFile = null;
    
    fileInput.addEventListener('change', (e) => {
        const file = fileInput.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                currentFile = {
                    name: file.name,
                    type: file.type,
                    data: event.target.result
                };
                document.getElementById('messageInput').placeholder = `File selected: ${file.name}`;
            };
            reader.readAsDataURL(file);
        }
    });

    // --- 6. CHAT LOGIC ---
    let lastMessageTime = 0;
    const MESSAGE_COOLDOWN = 2000;
    let allMessages = [];
    
    function formatTime(timestamp) {
        const date = new Date(timestamp);
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    function formatFullTime(timestamp) {
        const date = new Date(timestamp);
        return date.toLocaleString();
    }

    function send() {

        if (isMuted) {
            alert("you are muted");
            return;
        }
        
        if (chatLocked) {
            alert("chat is currently locked by an admin");
            return;
        }
        
        const now = Date.now();
        if (now - lastMessageTime < MESSAGE_COOLDOWN) {
            alert("Slow down! Wait 2 seconds between messages.");
            return;
        }
        
        const val = document.getElementById('messageInput').value;
        if(!val && !currentFile) return;

        const cleanVal = DOMPurify.sanitize(val);
        
        lastMessageTime = now;

        let displayPfp = myPfp;
        if (myUsername === "aeroPlayerwindows7") {
            displayPfp = "pfps/AdmPfp.png";
        } else if (myUsername === "agentxbox!") {
            displayPfp = "pfps/OwnerPfp.png";
        } else if (myUsername === "TheAeroFan101_2") {
            displayPfp = "pfps/AeroFanPfp.jfif";
        } else if (myUsername === "Oiacat") {
            displayPfp = "pfps/StopPfp.webp";
        }
        
        const messageData = {
            user: DOMPurify.sanitize(myUsername),
            text: cleanVal,
            pfp: displayPfp,
            timestamp: Date.now()
        };
        
        if (currentFile) {
            messageData.file = currentFile;
        }
        
        db.ref('messages').push(messageData);
        document.getElementById('messageInput').value = "";
        document.getElementById('messageInput').placeholder = "Type a message...";
        currentFile = null;
        fileInput.value = "";
    }

    document.getElementById('sendBtn').onclick = send;
    document.getElementById('messageInput').onkeypress = (e) => { if(e.key === 'Enter') send(); };

    function renderFileAttachment(file) {
        if (!file) return '';
        
        const type = file.type;
        const data = file.data;
        
        if (type.startsWith('image/')) {
            return `<div class="file-attachment"><img src="${data}" alt="${file.name}"></div>`;
        } else if (type.startsWith('video/')) {
            return `<div class="file-attachment"><video controls src="${data}"></video></div>`;
        } else if (type.startsWith('audio/')) {
            return `<div class="file-attachment"><audio controls src="${data}"></audio></div>`;
        }
        return '';
    }

    db.ref('messages').limitToLast(100).on('child_added', (snap) => {
        const data = snap.val();
        const chatWindow = document.getElementById('chat-window');

        if (!chatWindow || !data || !data.user) return;
    
        allMessages.push({ id: snap.key, ...data });
        if (allMessages.length > 500) allMessages.shift();
    
        const isMe = data.user === myUsername;
        const isAgentXbox = data.user === "agentxbox!";
    
        const wrap = document.createElement('div');
        wrap.className = `msg-wrapper ${isMe ? 'right' : 'left'}`;
    
        const timeStr = formatTime(data.timestamp);
        const { processed, youtubeEmbed } = processMessage(data.text || '');
    
        const fileHtml = data.file ? renderFileAttachment(data.file) : '';
        const purifyConfig = {
            ALLOWED_TAGS: ['img', 'a', 'div', 'span', 'iframe', 'video', 'audio', 'br', 'b', 'i'],
            ALLOWED_ATTR: ['src', 'href', 'class', 'style', 'controls', 'width', 'height', 'frameborder', 'allowfullscreen', 'target', 'rel', 'title', 'alt'],
            ADD_ATTR: ['target']
        };

        const cleanUser = DOMPurify.sanitize(data.user);
        const cleanContent = DOMPurify.sanitize(processed + youtubeEmbed + fileHtml, purifyConfig);
    
        wrap.innerHTML = `
            <span class="username-label">
                <span class="username-text">${cleanUser}</span>
                ${getBadge(data.user)}
                <span class="timestamp-label">${timeStr}</span>
            </span>
            <div class="bubble-row">
                <div class="pfp-area">
                    <img src="${DOMPurify.sanitize(data.pfp) || 'pfps/defaults/pfpdefault1.png'}" class="pfp-img">
                    <img src="pfps/pfpframe.png" class="pfp-frame">
                </div>
                <div class="bubble ${isAgentXbox ? 'rainbow-bubble' : ''}">
                    ${cleanContent}
                </div>
            </div>
        `;
    
        const usernameSpan = wrap.querySelector('.username-text');
        usernameSpan.textContent = data.user; 
        usernameSpan.innerHTML = parseEmojis(usernameSpan.textContent);
    
        const bubble = wrap.querySelector('.bubble');
        if (data.text) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = processed + youtubeEmbed + fileHtml;
            bubble.innerHTML = '';
            bubble.appendChild(tempDiv);
        }
    
        twemoji.parse(bubble, {
            folder: 'svg',
            ext: '.svg',
            className: 'emoji'
        });
    
        chatWindow.appendChild(wrap);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    });

    // --- 7. SEARCH FUNCTIONALITY ---
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    
    searchInput.addEventListener('input', () => {
        const query = searchInput.value.toLowerCase();
        if (query.length < 2) {
            searchResults.style.display = 'none';
            return;
        }
        
        const results = allMessages.filter(msg => 
            msg.user.toLowerCase().includes(query) || 
            (msg.text || '').toLowerCase().includes(query)
        ).slice(-20).reverse();
        
        if (results.length === 0) {
            searchResults.innerHTML = '<div style="padding:10px;color:#666;">No results found</div>';
        } else {
            searchResults.innerHTML = results.map(msg => `
                <div class="search-result-item" data-id="${msg.id}">
                    <div><strong>${msg.user}</strong> <span class="search-result-time">${formatFullTime(msg.timestamp)}</span></div>
                    <div style="font-size:13px;">${(msg.text || '[File]').substring(0, 50)}${(msg.text || '').length > 50 ? '...' : ''}</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.search-result-item').forEach(item => {
                item.addEventListener('click', () => {
                    const msgId = item.dataset.id;
                    const msg = allMessages.find(m => m.id === msgId);
                    if (msg) {
                        alert(`Message from ${msg.user} at ${formatFullTime(msg.timestamp)}:\n\n${msg.text || '[File attachment]'}`);
                    }
                    searchResults.style.display = 'none';
                    searchInput.value = '';
                });
            });
        }
        
        searchResults.style.display = 'block';
    });
    
    document.addEventListener('click', (e) => {
        if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
            searchResults.style.display = 'none';
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        twemoji.parse(document.body, {
            folder: 'svg',
            ext: '.svg',
            className: 'emoji'
        });
    });

const msnSound = new Audio('https://raw.githubusercontent.com/windowsgreen55-stack/yes/main/MSN%20Messenger%20Notification%20Alert.mp3');

const initMSN = () => {
    const chatWindow = document.getElementById('chat-window');
    
    if (!chatWindow) {
        setTimeout(initMSN, 500);
        return;
    }

    const observer = new MutationObserver((mutations) => {
        mutations.forEach(mutation => {
            if (mutation.addedNodes.length > 0) {
                msnSound.play().catch(() => {});
            }
        });
    });

    observer.observe(chatWindow, { childList: true, subtree: false });
};

if (document.readyState === 'complete') {
    initMSN();
} else {
    window.addEventListener('load', initMSN);
}

(function() {
    const bg = document.createElement('div');
    bg.style.cssText = `
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: url('wallpapers/wallpaper1.png') center/cover;
        z-index: 9999; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
    `;
    
    const loadingImg = document.createElement('img');
    loadingImg.src = 'loading.gif';
    loadingImg.style.cssText = 'width: 64px; height: 64px;';
    
    const connectingText = document.createElement('div');
    connectingText.style.cssText = `
        color: white; font-size: 24px; margin-top: 20px;
        text-shadow: 2px 2px 4px black; font-family: Aero, sans-serif;
    `;
    connectingText.textContent = 'Connecting';
    
    const logsDiv = document.createElement('div');
    logsDiv.style.cssText = `
        color: #ccc; font-size: 12px; margin-top: 30px;
        font-family: monospace; max-height: 200px; overflow-y: auto;
        text-shadow: 1px 1px 2px black; width: 500px;
    `;
    
    bg.appendChild(loadingImg);
    bg.appendChild(connectingText);
    bg.appendChild(logsDiv);
    document.body.appendChild(bg);
    
    const dots = ['', '.', '..', '...'];
    let dotIndex = 0;
    const dotInterval = setInterval(() => {
        dotIndex = (dotIndex + 1) % dots.length;
        connectingText.textContent = 'Connecting' + dots[dotIndex];
    }, 400);
    
    function addLog(msg, color = '#ccc') {
        const log = document.createElement('div');
        const time = new Date().toLocaleTimeString();
        log.style.color = color;
        log.textContent = `[${time}] ${msg}`;
        logsDiv.appendChild(log);
        logsDiv.scrollTop = logsDiv.scrollHeight;
    }
    
    addLog('[INFO] Initializing AeroChat...', '#7abcff');
    addLog('[CONNECTING] Testing Firebase connection...', '#7abcff');
    
    const timeout = setTimeout(() => {
        clearInterval(dotInterval);
        addLog('[ERROR] Connection timeout (10 seconds)', '#ff6666');
        addLog('[ERROR] Firebase may be down or unreachable', '#ff6666');
        connectingText.textContent = 'Connection Failed';
        connectingText.style.color = '#ff6666';
        
        const retryBtn = document.createElement('button');
        retryBtn.textContent = 'Retry';
        retryBtn.style.cssText = 'margin-top: 20px; padding: 10px 30px; font-size: 16px; cursor: pointer;';
        retryBtn.onclick = () => location.reload();
        bg.appendChild(retryBtn);
    }, 10000);
    
    // REAL CONNECTION TEST - tries to actually read from database
    const testRef = firebase.database().ref('.info/connected');
    const dataRef = firebase.database().ref('users');
    
    let connected = false;
    let dataReceived = false;
    
    testRef.on('value', (snap) => {
        if (snap.val() === true) {
            connected = true;
            addLog('[SUCCESS] Connected to Firebase presence', '#66ff66');
        } else {
            addLog('[WARN] Firebase presence offline', '#ffcc00');
        }
    });
    
    // Try to actually read data - this will fail if database is down
    dataRef.limitToFirst(1).once('value')
        .then((snap) => {
            dataReceived = true;
            clearTimeout(timeout);
            clearInterval(dotInterval);
            addLog('[SUCCESS] Database read successful!', '#66ff66');
            addLog('[INFO] Loading AeroChat...', '#7abcff');
            
            connectingText.textContent = 'Connected!';
            
            setTimeout(() => {
                bg.style.transition = 'opacity 0.5s';
                bg.style.opacity = '0';
                setTimeout(() => bg.remove(), 500);
            }, 800);
        })
        .catch((error) => {
            clearTimeout(timeout);
            clearInterval(dotInterval);
            addLog(`[ERROR] Database read failed: ${error.message}`, '#ff6666');
            addLog('[ERROR] Firebase database is unreachable', '#ff6666');
            connectingText.textContent = 'Connection Failed';
            connectingText.style.color = '#ff6666';
            
            const retryBtn = document.createElement('button');
            retryBtn.textContent = 'Retry';
            retryBtn.style.cssText = 'margin-top: 20px; padding: 10px 30px; font-size: 16px; cursor: pointer;';
            retryBtn.onclick = () => location.reload();
            bg.appendChild(retryBtn);
        });
})();

(function() {
    const db = firebase.database();
    const sessionId = localStorage.getItem('aero_session') || Math.random().toString(36).substring(2);
    localStorage.setItem('aero_session', sessionId);
    
    const ipRef = db.ref('ips/' + sessionId);
    
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(data => {
            const ip = data.ip;
            
            db.ref('active_ips/' + ip.replace(/\./g, '_')).once('value', (snap) => {
                const existing = snap.val();
                
                if (existing && existing.session !== sessionId) {
                    document.documentElement.innerHTML = `
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <meta charset="UTF-8">
                            <title>AeroChat</title>
                        </head>
                        <body style="background: white; margin: 0; height: 100vh;">
                        </body>
                        </html>
                    `;
                    return;
                }
                
                db.ref('active_ips/' + ip.replace(/\./g, '_')).set({
                    session: sessionId,
                    timestamp: Date.now()
                });
                
                ipRef.set({
                    ip: ip,
                    timestamp: Date.now()
                });
                
                ipRef.onDisconnect().remove();
                db.ref('active_ips/' + ip.replace(/\./g, '_')).onDisconnect().remove();
            });
        })
        .catch(() => {});
    
    window.addEventListener('beforeunload', () => {
        db.ref('active_ips/' + sessionId).remove();
        ipRef.remove();
    });
})();

(function() {
    const db = firebase.database();
    const redUsers = ['BryanSuperAero', 'aeroPlayerwindows7'];
    
    const style = document.createElement('style');
    style.textContent = `
        .bubble.red-bubble {
            background: linear-gradient(to bottom, #ff4444 0%, #cc0000 100%) !important;
            color: white !important;
            text-shadow: 0 1px 1px rgba(0,0,0,0.5) !important;
        }
    `;
    document.head.appendChild(style);
    
    db.ref('messages').on('child_added', (snap) => {
        const data = snap.val();
        if (redUsers.includes(data.user)) {
            setTimeout(() => {
                const bubbles = document.querySelectorAll('.bubble');
                const lastBubble = bubbles[bubbles.length - 1];
                if (lastBubble && !lastBubble.classList.contains('red-bubble')) {
                    const usernameLabel = lastBubble.closest('.msg-wrapper')?.querySelector('.username-text');
                    if (usernameLabel && redUsers.includes(usernameLabel.textContent)) {
                        lastBubble.classList.add('red-bubble');
                    }
                }
            }, 50);
        }
    });
    
    document.querySelectorAll('.bubble').forEach(bubble => {
        const wrapper = bubble.closest('.msg-wrapper');
        if (wrapper) {
            const username = wrapper.querySelector('.username-text')?.textContent;
            if (redUsers.includes(username)) {
                bubble.classList.add('red-bubble');
            }
        }
    });
})();
